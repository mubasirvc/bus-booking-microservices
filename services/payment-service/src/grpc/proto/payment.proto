syntax = "proto3";

package payment;

service PaymentService {
  rpc CreatePayment(CreatePaymentRequest)
      returns (CreatePaymentResponse);
}

message CreatePaymentRequest {
  string bookingId = 1;
  string userId = 2;
  double amount = 3;
}

message CreatePaymentResponse {
  string paymentId = 1;
  string orderId = 2;
  double amount = 3;
  string status = 4;
}