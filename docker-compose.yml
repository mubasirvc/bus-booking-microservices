services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: bus_booking-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - bus_booking-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  auth-db:
    image: mysql:8.0
    container_name: bus_booking-auth-db
    environment:
      MYSQL_DATABASE: bus_booking_auth_service
      MYSQL_USER: bus_booking_auth_user
      MYSQL_PASSWORD: bus_booking_auth_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - auth-db-data:/var/lib/mysql
    networks:
      - bus_booking-network

volumes:
  rabbitmq-data:
  auth-db-data:

networks:
  bus_booking-network: